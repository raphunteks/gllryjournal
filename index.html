<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zettbos Scrapbook Gallery</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --neon-green: #4ade80;
      --dark-bg: #0f172a;
      --glass-bg: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(74, 222, 128, 0.3);
    }
    
    body {
      background-color: var(--dark-bg);
      background-image: radial-gradient(circle at 15% 50%, rgba(74, 222, 128, 0.08), transparent 25%), 
                        radial-gradient(circle at 85% 30%, rgba(74, 222, 128, 0.05), transparent 25%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: #e2e8f0;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .font-handwriting { font-family: 'Caveat', cursive; }

    /* CSS3 ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      70% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    .animate-staggered {
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* POLAROID 3D FLIP & FLOAT CSS3 MAGIC */
    .polaroid-container {
      perspective: 1200px;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      aspect-ratio: 3/4;
      cursor: pointer;
      transition: transform 0.4s ease, filter 0.4s ease;
    }
    
    .polaroid-container:hover, .polaroid-container:active {
      transform: translateY(-10px) scale(1.02);
      filter: drop-shadow(0 20px 25px rgba(74, 222, 128, 0.15));
      z-index: 10;
    }

    .polaroid-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-style: preserve-3d;
    }

    .polaroid-container.is-flipped .polaroid-inner {
      transform: rotateY(180deg);
    }

    .polaroid-front, .polaroid-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: 6px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
    }

    .polaroid-front {
      background-color: #f8fafc;
      padding: 12px 12px 65px 12px;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .polaroid-photo-wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1e293b;
      border: 1px solid #cbd5e1;
      border-radius: 2px;
    }

    /* TAPE EFFECT */
    .polaroid-container::before {
      content: '';
      position: absolute;
      top: -14px;
      left: 50%;
      width: 110px;
      height: 32px;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2), inset 0 0 10px rgba(255,255,255,0.3);
      transform: translateX(-50%) rotate(-3deg);
      z-index: 50;
      pointer-events: none;
      border-radius: 2px;
    }

    .polaroid-back {
      background-color: #fdfbf7;
      background-image: 
        linear-gradient(rgba(74, 222, 128, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 222, 128, 0.15) 1px, transparent 1px);
      background-size: 20px 20px;
      color: #1e293b;
      transform: rotateY(180deg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 1px solid #cbd5e1;
    }

    .scrapbook-board {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(74, 222, 128, 0.05);
      border-radius: 24px;
      position: relative;
    }

    .z-safe-layer { z-index: -10; }
    .rotate-1 { transform: rotate(-2.5deg); }
    .rotate-2 { transform: rotate(3deg); }
    .rotate-3 { transform: rotate(-1.5deg); }

    .file-drop-area {
      position: relative;
      border: 2px dashed rgba(74, 222, 128, 0.4);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      background: rgba(15, 23, 42, 0.5);
      transition: all 0.3s ease;
      cursor: pointer;
      overflow: hidden;
    }
    .file-drop-area:hover, .file-drop-area.dragover {
      background: rgba(74, 222, 128, 0.1);
      border-color: var(--neon-green);
    }
    .file-input {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; z-index: 10;
    }

    textarea::-webkit-scrollbar { width: 6px; }
    textarea::-webkit-scrollbar-thumb { background-color: var(--neon-green); border-radius: 4px; }
    
    #update-indicator {
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
  </style>
</head>
<body class="p-4 md:p-8 relative">

  <!-- Toast Notification Container (ZettBOT Fix) -->
  <div id="toast-container" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

  <header class="text-center mb-8 mt-4 relative z-20 flex flex-col items-center">
    <h1 class="text-4xl md:text-6xl font-bold tracking-tight text-white mb-2" style="animation: fadeUp 0.8s ease forwards;">
      Our <span class="text-green-400 font-handwriting text-5xl md:text-7xl drop-shadow-[0_0_15px_rgba(74,222,128,0.6)]">Memories</span>
    </h1>
    <p class="text-slate-400 text-sm md:text-base max-w-lg mx-auto mb-6" style="animation: fadeUp 1s ease forwards;">Kumpulan foto, waktu, dan rasa yang diabadikan.</p>
    
    <button onclick="openModal()" style="animation: popIn 1.2s ease forwards;" class="flex items-center gap-2 px-6 py-3 bg-green-500/10 border border-green-400 text-green-400 rounded-full font-semibold hover:bg-green-400 hover:text-slate-900 transition-all duration-300 shadow-[0_0_15px_rgba(74,222,128,0.2)] hover:shadow-[0_0_30px_rgba(74,222,128,0.5)] transform hover:-translate-y-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      Upload Memori Baru
    </button>
  </header>

  <main class="scrapbook-board max-w-7xl mx-auto p-6 md:p-12 relative z-10 min-h-[60vh]">
    <!-- Sinkronisasi Indicator -->
    <div id="update-indicator" class="absolute top-4 right-4 flex items-center gap-2 px-3 py-1 bg-slate-800/80 rounded-full border border-slate-600 opacity-0 transform translate-y-[-10px] pointer-events-none z-30">
      <div class="w-2 h-2 bg-green-400 rounded-full animate-ping"></div>
      <span class="text-xs text-slate-300 font-mono">Sinkronisasi Server...</span>
    </div>

    <!-- Loading State -->
    <div id="loader" class="flex flex-col items-center justify-center h-64 space-y-4">
      <div class="relative w-16 h-16">
        <div class="absolute inset-0 border-4 border-slate-700 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-green-400 rounded-full border-t-transparent animate-spin"></div>
      </div>
      <p class="text-green-400 font-medium animate-pulse tracking-widest font-mono text-sm">MEMUAT JURNAL...</p>
    </div>

    <!-- Gallery Grid -->
    <div id="gallery-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 md:gap-14 hidden"></div>
    
    <!-- Empty State -->
    <div id="empty-state" class="hidden flex-col items-center justify-center h-64 space-y-4 text-center">
      <div class="text-6xl mb-2 opacity-50 drop-shadow-xl animate-bounce">📸</div>
      <h3 class="text-2xl text-white font-semibold">Buku Jurnal Kosong</h3>
      <p class="text-slate-400">Mulailah cerita dengan meng-upload foto pertama dari perangkatmu.</p>
    </div>
  </main>

  <!-- MODAL UPLOAD -->
  <div id="upload-modal" class="fixed inset-0 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-400 z-50">
    <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-lg z-safe-layer transition-opacity" onclick="closeModal()"></div>
    
    <div class="relative w-full max-w-md bg-slate-800/90 border border-green-500/40 rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.8)] p-6 md:p-8 transform scale-90 opacity-0 transition-all duration-400 ease-out" id="modal-panel">
      
      <button type="button" onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white hover:bg-white/10 p-1 rounded-full transition-colors z-20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
        <span class="text-green-400">🖼️</span> Tambah Foto
      </h2>

      <form id="upload-form" onsubmit="event.preventDefault(); submitMemory();" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Pilih Foto Jurnal</label>
          <div class="file-drop-area" id="drop-area">
            <input type="file" id="input-file" accept="image/*" class="file-input" required onchange="handleFileSelect(event)">
            
            <div id="upload-prompt" class="flex flex-col items-center justify-center space-y-2 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-green-400/70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <p class="text-slate-300 text-sm font-medium">Klik atau Drag & Drop foto di sini</p>
              <p class="text-slate-500 text-xs">Maksimal 5MB (JPG/PNG)</p>
            </div>

            <div id="image-preview-container" class="hidden relative w-full h-40 rounded-lg overflow-hidden border border-slate-600">
              <img id="image-preview" src="" alt="Preview" class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-slate-900/50 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                <span class="text-white text-sm font-medium bg-black/60 px-3 py-1 rounded-full">Ganti Foto</span>
              </div>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Tanggal</label>
            <input type="date" id="input-tanggal" required class="w-full bg-slate-900/60 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400 transition-colors [&::-webkit-calendar-picker-indicator]:invert">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Lokasi</label>
            <input type="text" id="input-lokasi" required placeholder="Di mana?" class="w-full bg-slate-900/60 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400 transition-colors">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Pesan / Caption</label>
          <textarea id="input-pesan" required rows="3" placeholder="Apa yang kamu rasakan waktu itu?..." class="w-full bg-slate-900/60 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400 transition-colors resize-none"></textarea>
        </div>

        <div class="pt-2">
          <button type="submit" id="btn-submit" class="w-full py-3 bg-green-500 hover:bg-green-400 text-slate-900 font-bold rounded-xl shadow-[0_0_15px_rgba(74,222,128,0.3)] transition-all flex items-center justify-center gap-2 text-lg">
            Simpan ke Jurnal
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ==========================================
    // ZETTBOT PROTOCOL: API FETCH & SWR CACHING
    // EXTERNAL GITHUB HOSTING SUPPORT (BULLETPROOF UPGRADE)
    // ==========================================

    // URL API dari Google Apps Script Anda (PASTIKAN URL INI BENAR & AKTIF)
    const API_URL = "https://script.google.com/macros/s/AKfycbxJB9eHWtzzCZdcxo5J-95wAH8J-6k7iyR7Ngg6hmMQGnDAyV0z42fnx5dFSXme6GQ/exec";
    const rotateClasses = ['rotate-1', 'rotate-2', 'rotate-3'];
    
    let selectedFileBase64 = null;
    let selectedFileName = null;
    let selectedFileMime = null;

    // --- ZETTBOT FIX: CUSTOM TOAST NOTIFICATION ---
    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      const bgColor = type === 'success' ? 'bg-green-500/90 border-green-400' : 'bg-red-500/90 border-red-400';
      const icon = type === 'success' ? '✨' : '⚠️';
      
      toast.className = `flex items-center gap-3 px-5 py-3.5 rounded-xl border shadow-2xl text-white font-medium text-sm transform transition-all duration-300 translate-y-10 opacity-0 ${bgColor} backdrop-blur-md pointer-events-auto`;
      toast.innerHTML = `<span class="text-lg">${icon}</span> <span>${message}</span>`;
      
      document.getElementById('toast-container').appendChild(toast);
      
      requestAnimationFrame(() => {
        toast.classList.remove('translate-y-10', 'opacity-0');
        toast.classList.add('translate-y-0', 'opacity-100');
      });
      
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-10', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }
    // ----------------------------------------------

    document.addEventListener("DOMContentLoaded", () => {
      fetchGallery();
      setupDragDrop();
    });

    // 1. UPLOAD FILE READER LOGIC
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        showToast("Ukuran file terlalu besar! Maksimal 5MB.", "error");
        event.target.value = '';
        return;
      }
      selectedFileName = file.name;
      selectedFileMime = file.type;

      const reader = new FileReader();
      reader.onload = function(e) {
        selectedFileBase64 = e.target.result;
        document.getElementById('upload-prompt').classList.add('hidden');
        const previewContainer = document.getElementById('image-preview-container');
        previewContainer.classList.remove('hidden');
        document.getElementById('image-preview').src = selectedFileBase64;
      };
      reader.readAsDataURL(file);
    }

    function setupDragDrop() {
      const dropArea = document.getElementById('drop-area');
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, preventDefaults, false);
      });
      function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
      ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
      });
      ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
      });
    }

    // 2. FETCH DATA VIA REST API (SAFE SWR CACHING)
    function fetchGallery() {
      const cacheKey = 'zettbos_gallery_production';
      let cachedData = null;
      
      try {
        cachedData = localStorage.getItem(cacheKey);
      } catch (e) {
        console.warn("ZettBOT: LocalStorage terblokir.");
      }

      if (cachedData) {
        document.getElementById('loader').classList.add('hidden');
        renderGallery(JSON.parse(cachedData));
        showUpdateIndicator(true);
        fetchFromServer(true);
      } else {
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('gallery-container').classList.add('hidden');
        fetchFromServer(false);
      }
    }

    function fetchFromServer(isBackgroundSync) {
      // ZETTBOT FIX: Tambahkan 'redirect: follow' untuk menangani URL GAS
      fetch(API_URL, {
        method: 'GET',
        redirect: 'follow'
      })
      .then(response => {
        if (!response.ok) throw new Error("Gagal menyambung ke server Google");
        // ZETTBOT FIX: Parse sebagai TEXT dulu, bukan JSON langsung (Mencegah Fatal Error)
        return response.text(); 
      })
      .then(textData => {
        try {
          // Parsing manual untuk menangkap error jika Google mengembalikan halaman HTML Login
          const res = JSON.parse(textData);
          
          if (res.status === 'success') {
            try {
              localStorage.setItem('zettbos_gallery_production', JSON.stringify(res.data));
            } catch (e) {}
            
            renderGallery(res.data);
          } else {
            if(!isBackgroundSync) handleError(res.message);
          }
        } catch(e) {
          throw new Error("Respons server bukan JSON (Terdeteksi HTML). Pastikan setelan Deploy API Google Anda = 'Siapa Saja' / 'Anyone'.");
        }
      })
      .catch(error => {
        if(!isBackgroundSync) handleError(error.message);
      })
      .finally(() => {
        showUpdateIndicator(false);
      });
    }

    function showUpdateIndicator(show) {
      const indicator = document.getElementById('update-indicator');
      if (show) indicator.classList.remove('opacity-0', 'translate-y-[-10px]');
      else indicator.classList.add('opacity-0', 'translate-y-[-10px]');
    }

    function renderGallery(data) {
      document.getElementById('loader').classList.add('hidden');
      const container = document.getElementById('gallery-container');
      const emptyState = document.getElementById('empty-state');

      if (!data || data.length === 0) {
        emptyState.classList.remove('hidden');
        container.classList.add('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      container.classList.remove('hidden');

      let htmlBuilder = '';
      data.forEach((item, index) => {
        const rotateClass = rotateClasses[index % rotateClasses.length];
        const delay = index * 0.15; 
        
        htmlBuilder += `
          <div class="polaroid-container ${rotateClass} animate-staggered" style="animation-delay: ${delay}s" onclick="toggleFlip(this)">
            <div class="polaroid-inner">
              <div class="polaroid-front">
                <div class="polaroid-photo-wrapper relative group">
                  <img src="${item.url}" alt="Memori ${item.id}" loading="lazy" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                </div>
                <div class="absolute bottom-5 left-0 right-0 text-center text-slate-800 font-handwriting text-2xl md:text-3xl px-2 truncate">
                  ${item.lokasi}
                </div>
              </div>
              <div class="polaroid-back">
                <div class="flex flex-col h-full w-full relative">
                  <span class="text-green-600 font-bold text-xs md:text-sm tracking-widest uppercase border-b-2 border-green-200/50 pb-2 mb-4 w-full text-center">
                    ${item.tanggal}
                  </span>
                  <div class="flex-grow flex items-center justify-center">
                    <p class="font-handwriting text-2xl md:text-3xl leading-relaxed text-slate-800 text-center px-2">
                      "${item.pesan}"
                    </p>
                  </div>
                  <div class="mt-4 text-[10px] md:text-xs text-slate-400 w-full text-right font-mono">
                    ${item.id}
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = htmlBuilder;
    }

    // 3. MODAL ANIMATION
    function openModal() {
      const modal = document.getElementById('upload-modal');
      const panel = document.getElementById('modal-panel');
      modal.classList.remove('opacity-0', 'pointer-events-none');
      requestAnimationFrame(() => {
        panel.classList.remove('scale-90', 'opacity-0');
        panel.classList.add('scale-100', 'opacity-100');
      });
    }

    function closeModal() {
      const modal = document.getElementById('upload-modal');
      const panel = document.getElementById('modal-panel');
      panel.classList.remove('scale-100', 'opacity-100');
      panel.classList.add('scale-90', 'opacity-0');
      
      setTimeout(() => {
        modal.classList.add('opacity-0', 'pointer-events-none');
        document.getElementById('upload-form').reset();
        selectedFileBase64 = null;
        document.getElementById('upload-prompt').classList.remove('hidden');
        document.getElementById('image-preview-container').classList.add('hidden');
        document.getElementById('image-preview').src = '';
      }, 300);
    }

    // 4. SUBMIT VIA FETCH API (CORS BYPASS + BULLETPROOF)
    function submitMemory() {
      if (!selectedFileBase64) {
        showToast("Wajib memilih foto terlebih dahulu!", "error");
        return;
      }

      const btn = document.getElementById('btn-submit');
      const tanggal = document.getElementById('input-tanggal').value;
      const lokasi = document.getElementById('input-lokasi').value;
      const pesan = document.getElementById('input-pesan').value;

      const originalBtnText = btn.innerHTML;
      btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-slate-900" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Mengunggah...`;
      btn.disabled = true;

      const payload = {
        base64Data: selectedFileBase64,
        fileName: selectedFileName,
        mimeType: selectedFileMime,
        tanggal: tanggal,
        lokasi: lokasi,
        pesan: pesan
      };

      // ZETTBOT FIX: Tambahkan 'redirect: follow' untuk memastikan POST request sukses di Google Script
      fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8', 
        },
        body: JSON.stringify(payload),
        redirect: 'follow'
      })
      .then(response => {
        if (!response.ok) throw new Error("Jaringan bermasalah atau Server Google menolak.");
        // ZETTBOT FIX: Parse sebagai TEXT untuk validasi error HTML
        return response.text(); 
      })
      .then(textData => {
        try {
          const res = JSON.parse(textData);
          if (res.status === true) {
            try { localStorage.removeItem('zettbos_gallery_production'); } catch(e) {}
            closeModal();
            fetchGallery(); 
            showToast("Memori berhasil disimpan!", "success");
          } else {
            showToast("Gagal: " + res.message, "error");
          }
        } catch (e) {
          showToast("Gagal mengunggah: Respons server tidak valid. Pastikan Deploy API = 'Siapa Saja'.", "error");
        }
      })
      .catch(error => {
        showToast("Terjadi Error: " + error.message, "error");
      })
      .finally(() => {
        btn.innerHTML = originalBtnText;
        btn.disabled = false;
      });
    }

    function handleError(errorMsg) { 
      // ZETTBOT FIX: Ganti console.error menjadi warn agar Canvas tidak crash memunculkan popup hitam
      console.warn("ZettBOT Log:", errorMsg); 
      showToast(errorMsg || 'Gagal tersambung ke server.', 'error');
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('empty-state').classList.remove('hidden');
    }
    
    function toggleFlip(element) {
      element.classList.toggle('is-flipped');
    }
  </script>
</body>
</html>
